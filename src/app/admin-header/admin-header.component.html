<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <!-- Botón menú -->
    <ion-buttons slot="start">
      <ion-button (click)="abrirMenu()">
        <ion-icon slot="icon-only" name="menu"></ion-icon>
      </ion-button>
    </ion-buttons>

    <!-- Título -->
    <ion-title>
      <ion-icon name="cog" slot="start"></ion-icon>
      Panel Administrador
    </ion-title>

    <!-- Información usuario -->
    <ion-buttons slot="end">
      <ion-chip color="success" *ngIf="usuarioActual">
        <ion-avatar>
          <ion-icon name="person-circle"></ion-icon>
        </ion-avatar>
        <ion-label>{{ usuarioActual.email }}</ion-label>
        <ion-icon name="chevron-down"></ion-icon>
      </ion-chip>
      
      <ion-button (click)="cerrarSesion()" color="danger" fill="solid">
        <ion-icon name="log-out" slot="start"></ion-icon>
        Cerrar Sesión
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<!-- Menú lateral -->
<ion-menu contentId="admin-content" menuId="admin-menu">
  <ion-header>
    <ion-toolbar color="primary">
      <ion-title>Menú</ion-title>
      <ion-buttons slot="end">
        <ion-button (click)="cerrarMenu()">
          <ion-icon name="close"></ion-icon>
        </ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>
  
  <ion-content>
    <ion-list>
      <ion-item button (click)="irAProductos(); cerrarMenu();">
        <ion-icon name="list" slot="start" color="primary"></ion-icon>
        <ion-label>Gestión de Productos</ion-label>
      </ion-item>
      
      <ion-item button (click)="irACatalogo(); cerrarMenu();">
        <ion-icon name="storefront" slot="start" color="success"></ion-icon>
        <ion-label>Ver Catálogo</ion-label>
      </ion-item>
      
      <ion-item button [routerLink]="['/carrito']" (click)="cerrarMenu();">
        <ion-icon name="cart" slot="start" color="warning"></ion-icon>
        <ion-label>Carrito de Compras</ion-label>
      </ion-item>

      <ion-item lines="none" button (click)="cerrarSesion(); cerrarMenu();" color="danger">
        <ion-icon name="log-out" slot="start"></ion-icon>
        <ion-label>Cerrar Sesión</ion-label>
      </ion-item>
    </ion-list>
  </ion-content>
</ion-menu>
