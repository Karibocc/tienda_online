<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Catálogo de Electrodomésticos</ion-title>
    <ion-buttons slot="end">
      <ion-button [routerLink]="['/tabs/carrito']">
        <ion-icon slot="icon-only" name="cart"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-grid>
    <ion-row>
      <ion-col size="12" size-md="6" *ngFor="let producto of productos">
        <ion-card>
          <img [src]="producto.imagen" alt="{{ producto.nombre }}" style="width: 100%; height: 200px; object-fit: cover;">
          <ion-card-header>
            <ion-card-title>{{ producto.nombre }}</ion-card-title>
            <ion-card-subtitle>${{ producto.precio | number }}</ion-card-subtitle>
          </ion-card-header>
          <ion-card-content>
            <ion-button expand="block" (click)="agregarAlCarrito(producto)">
              Añadir al carrito
            </ion-button>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
