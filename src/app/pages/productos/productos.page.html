<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Lista de Productos</ion-title>
    <ion-buttons slot="end">
      <ion-button [routerLink]="['/productos/nuevo']">
        <ion-icon name="add-circle" slot="start"></ion-icon>
        Nuevo Producto
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Productos</ion-title>
    </ion-toolbar>
  </ion-header>

  <div id="container">
    <ion-list>
      <ion-item *ngFor="let producto of productos">
        <ion-label>
          <h2>{{ producto.nombre }}</h2>
          <p><strong>Precio:</strong> {{ producto.precio | currency }}</p>
          <p>{{ producto.descripcion }}</p>
        </ion-label>
        <ion-buttons slot="end">
          <ion-button [routerLink]="['/productos/editar', producto.id]" color="primary">
            <ion-icon name="pencil" slot="icon-only"></ion-icon>
          </ion-button>
          <ion-button (click)="eliminarProducto(producto.id!)" color="danger">
            <ion-icon name="trash" slot="icon-only"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-item>
    </ion-list>

    <div *ngIf="productos.length === 0" class="empty-state">
      <ion-icon name="cube-outline" size="large"></ion-icon>
      <p>No hay productos registrados</p>
      <ion-button [routerLink]="['/productos/nuevo']" fill="outline">
        Crear primer producto
      </ion-button>
    </div>
  </div>
</ion-content>
