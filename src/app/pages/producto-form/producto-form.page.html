<!-- Header Administrador -->
<app-admin-header></app-admin-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <form (ngSubmit)="guardarProducto()">
    
    <!-- Sección de Imagen -->
    <div class="imagen-section">
      <ion-card>
        <ion-card-header>
          <ion-card-title>Imagen del Producto</ion-card-title>
        </ion-card-header>
        <ion-card-content class="imagen-content">
          
          <!-- Vista previa -->
          <div class="imagen-preview" *ngIf="imagenPrevia">
            <img [src]="imagenPrevia" alt="Vista previa">
            <ion-button fill="clear" color="danger" (click)="eliminarImagen()">
              <ion-icon name="trash" slot="icon-only"></ion-icon>
            </ion-button>
          </div>

          <!-- Placeholder cuando no hay imagen -->
          <div class="imagen-upload" *ngIf="!imagenPrevia">
            <ion-icon name="image-outline" size="large"></ion-icon>
            <p>Selecciona una imagen</p>
          </div>

          <!-- Input file oculto con referencia #imagenInput -->
          <input 
            type="file" 
            #imagenInput
            (change)="onImagenSeleccionada($event)" 
            accept="image/*" 
            hidden>
          
          <!-- Botón que activa el input file -->
          <ion-button 
            expand="block" 
            fill="outline" 
            (click)="imagenInput.click()">
            <ion-icon name="cloud-upload" slot="start"></ion-icon>
            {{ imagenPrevia ? 'Cambiar Imagen' : 'Seleccionar Imagen' }}
          </ion-button>

        </ion-card-content>
      </ion-card>
    </div>

    <!-- Campos del formulario -->
    <ion-item>
      <ion-label position="stacked">Nombre del Producto *</ion-label>
      <ion-input 
        type="text" 
        [(ngModel)]="producto.nombre" 
        name="nombre" 
        required
        placeholder="Ingresa el nombre del producto">
      </ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Precio *</ion-label>
      <ion-input 
        type="number" 
        [(ngModel)]="producto.precio" 
        name="precio" 
        required
        min="0"
        step="0.01"
        placeholder="0.00">
      </ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Descripción</ion-label>
      <ion-textarea 
        [(ngModel)]="producto.descripcion" 
        name="descripcion"
        rows="4" 
        placeholder="Describe el producto...">
      </ion-textarea>
    </ion-item>

    <!-- Botones -->
    <div class="button-container">
      <ion-button 
        type="submit" 
        expand="block" 
        color="primary"
        [disabled]="!producto.nombre || producto.precio < 0">
        <ion-icon name="save" slot="start"></ion-icon>
        {{ isEdit ? 'Actualizar' : 'Guardar' }} Producto
      </ion-button>

      <ion-button 
        expand="block" 
        fill="outline" 
        color="medium"
        (click)="cancelar()">
        <ion-icon name="close" slot="start"></ion-icon>
        Cancelar
      </ion-button>
    </div>

  </form>
</ion-content>

<!-- Footer Administrador -->
<app-admin-footer></app-admin-footer>
